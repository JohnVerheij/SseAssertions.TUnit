name: CodeQL

on:
  push:
    branches: [main]
    paths:
      - '**.cs'
      - '**.csproj'
      - '**.props'
      - '**.targets'
      - '.github/workflows/**'
      - '.github/actions/**'
      - '.github/codeql/codeql-config.yml'
  pull_request:
    branches: [main]
    paths:
      - '**.cs'
      - '**.csproj'
      - '**.props'
      - '**.targets'
      - '.github/workflows/**'
      - '.github/actions/**'
      - '.github/codeql/codeql-config.yml'

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read           # checkout + build (job-level perms override workflow-level)
      security-events: write   # upload CodeQL results to code scanning
      actions: read            # read workflow run metadata during analysis

    strategy:
      fail-fast: false
      matrix:
        # csharp is built (manual build-mode below); actions is the GitHub Actions
        # workflow analysis pack, which is interpreted and needs no build (build-mode: none).
        include:
          - language: csharp
            build-mode: manual
          - language: actions
            build-mode: none

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup .NET
        if: matrix.language == 'csharp'
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: |
            10.0.x

      - name: Initialize CodeQL
        # security-extended (instead of security-and-quality) keeps thorough security
        # coverage but drops the noisy quality query pack, which generates many
        # false-positive findings against generated code and stylistic concerns
        # already covered by the in-build analyzer pack (Meziantou, Sonar, Roslynator,
        # dpfa). config-file restricts scanning to code we own and ship - generated
        # code in obj/ and test code in tests/** are excluded so remaining findings
        # all reflect production-code issues we can act on.
        uses: github/codeql-action/init@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4.36.1
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended
          config-file: ./.github/codeql/codeql-config.yml

      - name: Build
        # Only the csharp row needs a build; the actions row is analyzed build-free.
        if: matrix.language == 'csharp'
        run: dotnet build --configuration Release

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4.36.1
        with:
          category: /language:${{ matrix.language }}
