name: renovate

# Self-hosted Renovate via GitHub Actions, authenticated as a dedicated
# GitHub App. Commits made via the App's installation token are auto-signed
# by GitHub, which satisfies the "Require signed commits" branch protection
# on main. Mend's hosted Renovate worked because Mend IS a GitHub App;
# self-hosted-via-PAT would not work because PAT-authenticated API commits
# are unsigned.
#
# Prerequisites (one-time setup, done manually outside this workflow):
#
#   1. Create a GitHub App at https://github.com/settings/apps/new
#      - Name: pick something repo-specific (e.g. "SseAssertions Renovate")
#      - Homepage URL: this repo's URL is fine
#      - Webhook: DISABLE (uncheck "Active") - we trigger via cron, not webhook
#      - Repository permissions:
#          Contents: Read & write
#          Issues: Read & write
#          Pull requests: Read & write
#          Workflows: Read & write
#          (Metadata: Read is auto-required)
#      - Subscribe to events: none
#      - Where can be installed: "Only on this account"
#
#   2. After creation, on the App's settings page:
#      - Note the App ID (numeric, visible at top)
#      - Scroll to "Private keys" -> "Generate a private key" -> downloads .pem
#
#   3. Install the App on this repository:
#      - On the App settings page, click "Install App" in the sidebar
#      - Choose this account, then "Only select repositories" -> SseAssertions.TUnit
#
#   4. Add two repo secrets (Settings -> Secrets and variables -> Actions):
#        RENOVATE_APP_ID         = the numeric App ID
#        RENOVATE_APP_PRIVATE_KEY = full contents of the .pem file (multi-line, OK)
#
#   5. Uninstall the Mend Renovate GitHub App from this repo (or change its
#      "Selected repositories" to exclude SseAssertions.TUnit) at
#      https://github.com/settings/installations so the two Renovate
#      instances do not produce duplicate PRs.

on:
  schedule:
    # Hourly. Renovate honors the schedule in renovate.json for which PRs
    # to open within a run; this cron just controls how often runs happen.
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      log-level:
        description: 'Renovate log level'
        type: choice
        required: false
        default: 'info'
        options:
          - debug
          - info
          - warn
      dry-run:
        description: 'Dry-run (analyze only, no PRs created)'
        type: boolean
        required: false
        default: false

# Renovate is not designed to run concurrently against the same repo.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  renovate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Mint GitHub App installation token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          show-progress: false

      - name: Self-hosted Renovate
        uses: renovatebot/github-action@v41
        env:
          LOG_LEVEL: ${{ inputs.log-level || 'info' }}
          RENOVATE_PLATFORM: github
          # platformCommit makes Renovate create commits via the GitHub API
          # instead of git CLI. API commits made by a GitHub App are auto-signed
          # by GitHub, which is the whole point of using the App here.
          RENOVATE_PLATFORM_COMMIT: 'true'
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_TOKEN: ${{ steps.app-token.outputs.token }}
          RENOVATE_USERNAME: ${{ steps.app-token.outputs.app-slug }}[bot]
          RENOVATE_GIT_AUTHOR: '${{ steps.app-token.outputs.app-slug }}[bot] <${{ secrets.RENOVATE_APP_ID }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com>'
          RENOVATE_DRY_RUN: ${{ inputs.dry-run && 'full' || '' }}

      - name: Upload Renovate log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: renovate-log
          path: |
            *.log
            ~/.npm/_logs/
          if-no-files-found: ignore
          retention-days: 7
