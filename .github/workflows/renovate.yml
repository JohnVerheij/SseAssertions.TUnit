name: renovate

# Self-hosted Renovate via GitHub Actions.
#
# Runs the same renovate.json config as the Mend-hosted version, but on a
# cron we control instead of Mend Community Free tier's opaque queue.
# Switch driver: today's Mend free tier left a TUnit-trio bump queued for
# 30+ minutes with no progress; self-hosted runs in seconds on its own
# schedule.
#
# Prerequisites (one-time setup, done manually outside this workflow):
#   1. Create a fine-grained PAT scoped to this repo with permissions:
#        Contents: read & write
#        Issues: read & write
#        Pull requests: read & write
#        Workflows: read & write
#      Token URL: https://github.com/settings/personal-access-tokens/new
#   2. Add the PAT as repo secret RENOVATE_TOKEN
#      (Settings -> Secrets and variables -> Actions -> New repository secret)
#   3. Uninstall the Mend Renovate GitHub App from this repo (or change its
#      "Selected repositories" to exclude SseAssertions.TUnit) so the two
#      Renovate instances do not produce duplicate PRs.
#      App URL: https://github.com/settings/installations
#
# Why a PAT and not GITHUB_TOKEN: PRs created with GITHUB_TOKEN do not
# trigger subsequent workflow runs (GitHub safety rule), so CI would never
# run on Renovate PRs and platformAutomerge would never fire.

on:
  schedule:
    # Hourly. Renovate honors the schedule in renovate.json for which PRs
    # to open within a run; this cron just controls how often runs happen.
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      log-level:
        description: 'Renovate log level'
        type: choice
        required: false
        default: 'info'
        options:
          - debug
          - info
          - warn
      dry-run:
        description: 'Dry-run (analyze only, no PRs created)'
        type: boolean
        required: false
        default: false

# Renovate is not designed to run concurrently against the same repo.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  renovate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Self-hosted Renovate
        uses: renovatebot/github-action@v41.0.0
        env:
          LOG_LEVEL: ${{ inputs.log-level || 'info' }}
          RENOVATE_PLATFORM: github
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
          RENOVATE_DRY_RUN: ${{ inputs.dry-run && 'full' || '' }}

      - name: Upload Renovate log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: renovate-log
          path: |
            *.log
            ~/.npm/_logs/
          if-no-files-found: ignore
          retention-days: 7
