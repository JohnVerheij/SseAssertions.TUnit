name: zizmor

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
      - '.github/zizmor.yml'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
      - '.github/zizmor.yml'

permissions:
  contents: read

concurrency:
  group: zizmor-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zizmor:
    name: Audit GitHub Actions workflows
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run zizmor
        # Static analysis of every workflow under .github/. advanced-security: false makes
        # zizmor exit non-zero on any finding (template injection, dangerous trigger,
        # unpinned action, credential persistence, ...), so this step blocks the PR on a new
        # workflow-security regression; annotations: true surfaces each finding inline on the
        # diff. The action's SARIF/code-scanning mode is deliberately not used: it does not
        # fail the job, and blocking is the goal here. The pinned action version pins the
        # zizmor release it runs.
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          advanced-security: false
          annotations: true
