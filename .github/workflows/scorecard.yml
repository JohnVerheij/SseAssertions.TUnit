name: Scorecard supply-chain security

on:
  # Re-score when branch protection changes (a Scorecard input), weekly, and on push to main.
  branch_protection_rule:
  schedule:
    - cron: '37 4 * * 1'
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read           # checkout + repository analysis (job-level perms override workflow-level)
      security-events: write   # upload SARIF results to GitHub code scanning
      id-token: write          # publish results to the public OpenSSF Scorecard API
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publishes the score to the public Scorecard API so the README badge resolves;
          # also feeds the OpenSSF transparency dataset. Safe for a public repository.
          publish_results: true

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
          category: scorecard
