name: Scorecard supply-chain security

on:
  # Re-score when branch protection changes (a Scorecard input), weekly, and on push to main.
  branch_protection_rule:
  schedule:
    - cron: '37 4 * * 1'
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read           # checkout + repository analysis (job-level perms override workflow-level)
      security-events: write   # upload SARIF results to GitHub code scanning
      id-token: write          # publish results to the public OpenSSF Scorecard API
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publishes the score to the public Scorecard API so the README badge resolves;
          # also feeds the OpenSSF transparency dataset. Safe for a public repository.
          publish_results: true

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4.36.1
        with:
          sarif_file: results.sarif
          category: scorecard
