name: dependabot-auto-merge

# Auto-merges Dependabot PRs that are patch- or minor-version bumps,
# but only after CI passes. Major bumps require manual review.
#
# Scope is intentionally narrow:
#   - patch + minor only (semver-patch, semver-minor)
#   - excludes major bumps (semver-major)
#   - relies on CI as the only gate; if CI is red, GitHub will not auto-merge
#
# Auto-merge must also be enabled on the repository
# (Settings -> General -> Pull Requests -> Allow auto-merge).

on: pull_request_target

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for patch and minor bumps
        if: steps.meta.outputs.update-type == 'version-update:semver-patch' || steps.meta.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
